<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KDS — Cuisine TropRapide</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #111;
      --border: #222;
      --yellow: #F5C800;
      --green: #22C55E;
      --red: #EF4444;
      --orange: #F97316;
      --blue: #3B82F6;
      --muted: #888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status {
      font-weight: 900;
      color: var(--green);
    }

    .header-stats {
      display: flex;
      gap: 12px;
    }

    .hstat {
      font-size: .8rem;
      color: var(--muted);
    }

    .hstat span {
      color: #fff;
      font-weight: 700;
    }

    /* NOTIFICATION TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--yellow);
      color: #000;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 900;
      font-size: .9rem;
      z-index: 999;
      transform: translateY(100px);
      transition: transform .3s;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(245, 200, 0, .3);
    }

    .toast.show {
      transform: translateY(0);
    }

    /* GRID */
    .kds-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: calc(100vh - 52px);
    }

    .kds-column {
      border-right: 2px solid #111;
      padding: 10px;
      overflow-y: auto;
    }

    .kds-column:last-child {
      border-right: none;
    }

    /* COLUMN TITLE */
    .kds-title {
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 10px;
      padding: 6px 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .col-count {
      font-size: .75rem;
      font-weight: 400;
      color: var(--muted);
    }

    /* CARD */
    .kds-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 6px solid var(--yellow);
      transition: border-color .3s;
    }

    .kds-card.urgente {
      border-left: 6px solid var(--red);
      background: #1a0f0f;
      animation: blink 1s infinite;
    }

    .kds-card.dispatch-done {
      border-left: 6px solid var(--blue);
    }

    @keyframes blink {
      0% {
        background: #1a0f0f;
      }

      50% {
        background: #2a0000;
      }

      100% {
        background: #1a0f0f;
      }
    }

    .kds-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .kds-id {
      color: var(--yellow);
      font-size: .9rem;
    }

    .kds-time {
      font-size: .85rem;
      color: var(--muted);
    }

    .kds-time.urgent {
      color: var(--red);
      animation: blink-text 1s infinite;
    }

    @keyframes blink-text {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    .kds-items {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 8px 0;
      line-height: 1.3;
    }

    .kds-meta {
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .kds-meta span {
      white-space: nowrap;
    }

    /* DRIVER BADGE on card */
    .driver-tag {
      background: #00001a;
      border: 1px solid var(--blue);
      color: var(--blue);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 8px;
    }

    /* ACTIONS */
    .kds-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .kds-btn {
      flex: 1;
      padding: 11px;
      font-weight: 900;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      transition: transform .1s;
    }

    .kds-btn:active {
      transform: scale(.96);
    }

    .btn-accept {
      background: var(--yellow);
      color: #000;
    }

    .btn-ready {
      background: var(--green);
      color: #fff;
    }

    .btn-cancel {
      background: #1a1a1a;
      color: var(--muted);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="status">🟢 CUISINE OUVERTE</div>
      <div class="header-stats">
        <span class="hstat">Nouvelles: <span id="h-new">0</span></span>
        <span class="hstat">Cuisine: <span id="h-prep">0</span></span>
        <span class="hstat">Prêtes: <span id="h-ready">0</span></span>
      </div>
    </div>
    <div id="time" style="color:var(--muted);font-size:.9rem;"></div>
  </div>

  <!-- KDS COLUMNS -->
  <div class="kds-container">

    <div class="kds-column">
      <div class="kds-title" style="background:#1a0000;">
        🔴 NOUVELLES
        <span class="col-count" id="count-new"></span>
      </div>
      <div id="col-new"></div>
    </div>

    <div class="kds-column">
      <div class="kds-title" style="background:#0f0800;">
        🟠 EN PRÉPARATION
        <span class="col-count" id="count-prep"></span>
      </div>
      <div id="col-prep"></div>
    </div>

    <div class="kds-column">
      <div class="kds-title" style="background:#001a00;">
        🟢 PRÊTES — DISPATCH AUTO
        <span class="col-count" id="count-ready"></span>
      </div>
      <div id="col-ready"></div>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* ============================================================
       FIREBASE CONFIGURATION
       ============================================================ */
    const firebaseConfig = {
      apiKey: "AIzaSyD0FL4ua8NUWKfwu_gGUL5TI1RkiNbBZnU",
      authDomain: "troprapide-821a7.firebaseapp.com",
      databaseURL: "https://troprapide-821a7-default-rtdb.firebaseio.com",
      projectId: "troprapide-821a7"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    /* ============================================================
       STATE (populated by Firebase real-time listener)
       ============================================================ */
    let state = { orders: {}, drivers: {}, log: {}, revenue: 0 };

    const SEED_DRIVERS = {
      'd1': { name: 'Ali Koné', avatar: '🏍️', lat: 5.370, lng: -3.980, status: 'available', speed: 1.2, activeOrders: 0 },
      'd2': { name: 'Brice Yao', avatar: '🛵', lat: 5.300, lng: -4.050, status: 'available', speed: 1.0, activeOrders: 0 },
      'd3': { name: 'Cédric Ama', avatar: '🏍️', lat: 5.352, lng: -4.020, status: 'available', speed: 1.5, activeOrders: 0 }
    };

    /* XSS sanitization */
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function addLog(msg) { rtdb.ref('/log').push({ time: Date.now(), msg }); }

    /* ============================================================
       MOTEUR DISPATCH (intégré dans KDS)
       ============================================================ */
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findBestDriver(order, drivers) {
      let best = null, bestScore = Infinity;
      const excluded = order.declinedBy ? Object.values(order.declinedBy) : [];
      Object.entries(drivers).forEach(([id, d]) => {
        if (d.status !== 'available') return;
        if (excluded.includes(id)) return;
        const dist = getDistance(order.lat, order.lng, d.lat, d.lng);
        const score = dist + ((d.activeOrders || 0) * 2) - (d.speed || 1);
        if (score < bestScore) { bestScore = score; best = { id, ...d, _dist: dist.toFixed(1), _score: bestScore }; }
      });
      return best;
    }

    function autoDispatch(orderId) {
      const order = (state.orders || {})[orderId];
      if (!order || order.assignedTo || order.status !== 'prete') return;
      const drivers = state.drivers && Object.keys(state.drivers).length > 0 ? state.drivers : SEED_DRIVERS;
      const best = findBestDriver(order, drivers);
      if (!best) {
        showToast(`❌ Aucun livreur dispo pour #${orderId.slice(-4)}`, '#EF4444');
        addLog(`❌ Aucun livreur disponible — commande #${orderId.slice(-4)} en attente`);
        return;
      }
      const updates = {};
      updates[`/orders/${orderId}/assignedTo`] = best.id;
      updates[`/orders/${orderId}/assignedName`] = best.name;
      updates[`/orders/${orderId}/status`] = 'attribue';
      updates[`/orders/${orderId}/dispatchedAt`] = Date.now();
      updates[`/drivers/${best.id}/status`] = 'busy';
      updates[`/drivers/${best.id}/activeOrders`] = (best.activeOrders || 0) + 1;
      updates[`/drivers/${best.id}/currentOrder`] = orderId;
      rtdb.ref().update(updates);
      addLog(`⚡ AUTO-DISPATCH: #${orderId.slice(-4)} → ${best.name} (${best._dist} km | score ${best._score.toFixed(2)})`);
      showToast(`⚡ Dispatch: #${orderId.slice(-4)} → ${best.name} (${best._dist}km)`, '#F5C800');
    }

    /* ============================================================
       TOAST
       ============================================================ */
    let toastTimer = null;
    function showToast(msg, color = '#F5C800') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = color;
      t.style.color = color === '#F5C800' ? '#000' : '#fff';
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }

    /* ============================================================
       RENDER KDS
       ============================================================ */
    function renderKDS() {
      const orders = state.orders || {};

      const newCol = document.getElementById('col-new');
      const prepCol = document.getElementById('col-prep');
      const readyCol = document.getElementById('col-ready');

      newCol.innerHTML = '';
      prepCol.innerHTML = '';
      readyCol.innerHTML = '';

      let cntNew = 0, cntPrep = 0, cntReady = 0;

      const kitchenOrders = Object.entries(orders)
        .filter(([, o]) => ['nouvelle', 'acceptee', 'prete'].includes(o.status))
        .sort((a, b) => (a[1].createdAt || 0) - (b[1].createdAt || 0));

      if (kitchenOrders.length === 0) {
        newCol.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px 10px;font-size:.85rem;">Aucune commande</p>';
      }

      kitchenOrders.forEach(([key, o]) => {
        const elapsed = Math.floor((Date.now() - (o.createdAt || Date.now())) / 60000);
        const isUrgent = elapsed > 15 && o.status !== 'prete';

        const card = `
      <div class="kds-card ${isUrgent ? 'urgente' : ''} ${o.status === 'prete' && o.assignedTo ? 'dispatch-done' : ''}">
        <div class="kds-header">
          <span class="kds-id">#${key.slice(-6).toUpperCase()}</span>
          <span class="kds-time ${isUrgent ? 'urgent' : ''}">${elapsed} min</span>
        </div>
        <div class="kds-items">${esc(o.items) || '—'}</div>
        <div class="kds-meta">
          <span>👤 ${esc(o.client) || '—'}</span>
          <span>📍 ${esc(o.zone) || '—'}</span>
          <span>💰 ${o.total ? o.total.toLocaleString('fr') + ' FCFA' : ''}</span>
        </div>
        ${o.assignedTo ? `<div class="driver-tag">🏍️ ${esc(o.assignedName || o.assignedTo)} — ${o.status === 'attribue' ? 'En attente de réponse' : 'En route'}</div>` : ''}
        <div class="kds-actions">
          ${o.status === 'nouvelle'
            ? `<button class="kds-btn btn-cancel" onclick="updateStatus('${key}','annulee')">✕</button>
               <button class="kds-btn btn-accept" onclick="updateStatus('${key}','acceptee')">✅ ACCEPTER</button>`
            : ''}
          ${o.status === 'acceptee'
            ? `<button class="kds-btn btn-ready" onclick="markReady('${key}')">🟢 COMMANDE PRÊTE</button>`
            : ''}
          ${o.status === 'prete' && !o.assignedTo
            ? `<button class="kds-btn btn-ready" style="background:var(--orange);" onclick="autoDispatch('${key}')">⚡ DISPATCH MANUELLEMENT</button>`
            : ''}
          ${o.status === 'prete' && o.assignedTo
            ? `<div style="text-align:center;width:100%;color:var(--blue);font-weight:700;font-size:.85rem;">✅ Livreur assigné — En route</div>`
            : ''}
        </div>
      </div>`;

        if (o.status === 'nouvelle') { newCol.innerHTML += card; cntNew++; }
        if (o.status === 'acceptee') { prepCol.innerHTML += card; cntPrep++; }
        if (o.status === 'prete') { readyCol.innerHTML += card; cntReady++; }
      });

      document.getElementById('count-new').textContent = cntNew > 0 ? cntNew : '';
      document.getElementById('count-prep').textContent = cntPrep > 0 ? cntPrep : '';
      document.getElementById('count-ready').textContent = cntReady > 0 ? cntReady : '';
      document.getElementById('h-new').textContent = cntNew;
      document.getElementById('h-prep').textContent = cntPrep;
      document.getElementById('h-ready').textContent = cntReady;

      const enRoute = Object.values(orders).filter(o => o.status === 'en-route').length;
      const attribue = Object.values(orders).filter(o => o.status === 'attribue').length;
      if (attribue > 0) {
        readyCol.innerHTML += `
      <div style="text-align:center;color:#A855F7;font-size:.8rem;padding:8px;border-top:1px solid var(--border);margin-top:4px;">
        📲 ${attribue} commande(s) en attente d'un livreur
      </div>`;
      }
      if (enRoute > 0) {
        readyCol.innerHTML += `
      <div style="text-align:center;color:var(--muted);font-size:.8rem;padding:8px;border-top:1px solid var(--border);margin-top:4px;">
        🔵 ${enRoute} commande(s) en route
      </div>`;
      }
    }

    /* ============================================================
       STATUS UPDATES
       ============================================================ */
    function updateStatus(id, status) {
      if (!(state.orders || {})[id]) return;
      rtdb.ref(`/orders/${id}`).update({ status, updatedAt: Date.now() });
      if (status === 'annulee') addLog(`❌ Commande #${id.slice(-4)} annulée par la cuisine`);
      else if (status === 'acceptee') addLog(`🍳 #${id.slice(-4)} acceptée — Préparation en cours`);
    }

    function markReady(id) {
      if (!(state.orders || {})[id]) return;
      rtdb.ref(`/orders/${id}`).update({ status: 'prete', readyAt: Date.now() });
      addLog(`🟢 #${id.slice(-4)} prête — Dispatch automatique lancé`);
      setTimeout(() => autoDispatch(id), 800);
    }

    /* ============================================================
       DEMO MODE: simule nouvelles commandes (écrit dans Firebase)
       ============================================================ */
    const DEMO_CLIENTS = ['Kouamé', 'Fatou', 'Pierre', 'Aminata', 'Roland', 'Sylvie'];
    const DEMO_ITEMS = [
      'Poulet braisé + Attiéké', 'Riz + Sauce graine', 'Foutou + Sauce arachide',
      'Poisson braisé + Alloco', 'Kedjenou de poulet'
    ];
    const DEMO_ZONES = ['Cocody', 'Koumassi', 'Treichville', 'Plateau', 'Yopougon'];
    const ZONE_COORDS = {
      'Cocody': { lat: 5.370, lng: -3.980 }, 'Koumassi': { lat: 5.290, lng: -4.010 },
      'Treichville': { lat: 5.300, lng: -4.005 }, 'Plateau': { lat: 5.320, lng: -4.020 },
      'Yopougon': { lat: 5.350, lng: -4.070 }
    };

    let demoTimer = null;
    function startDemoMode() {
      if (demoTimer) return;
      demoTimer = setInterval(() => {
        const pending = Object.values(state.orders || {}).filter(o => ['nouvelle', 'acceptee'].includes(o.status)).length;
        if (pending >= 5) return;
        const zone = DEMO_ZONES[Math.floor(Math.random() * DEMO_ZONES.length)];
        const z = ZONE_COORDS[zone];
        const id = 'cmd' + Date.now();
        rtdb.ref(`/orders/${id}`).set({
          client: DEMO_CLIENTS[Math.floor(Math.random() * DEMO_CLIENTS.length)],
          items: DEMO_ITEMS[Math.floor(Math.random() * DEMO_ITEMS.length)],
          total: 3000 + Math.floor(Math.random() * 2000),
          zone, lat: z.lat + (Math.random() * .01 - .005), lng: z.lng + (Math.random() * .01 - .005),
          status: 'nouvelle', restaurant: 'TropRapide',
          restaurantLat: 5.340, restaurantLng: -4.010,
          assignedTo: null, assignedName: null,
          createdAt: Date.now()
        });
        addLog(`📱 Nouvelle commande simulée — ${zone}`);
        showToast('📱 Nouvelle commande reçue !', '#F97316');
      }, 45000);
    }

    /* ============================================================
       CLOCK + INIT
       ============================================================ */
    setInterval(() => { document.getElementById('time').textContent = new Date().toLocaleTimeString('fr'); }, 1000);

    let _knownOrderIds = new Set();
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[660, 0], [880, .2], [1100, .4]].forEach(([f, t]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(.5, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .18);
          o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .19);
        });
        setTimeout(() => ctx.close(), 800);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      } catch (e) { }
    }

    /* Firebase real-time listeners — separate paths */
    let _initialLoad = true;

    rtdb.ref('/orders').on('value', snap => {
      state.orders = snap.val() || {};
      if (!_initialLoad) {
        let hasNew = false;
        Object.entries(state.orders).forEach(([id, o]) => {
          if (!_knownOrderIds.has(id) && o.status === 'nouvelle') { hasNew = true; }
        });
        if (hasNew) playBeep();
      }
      Object.keys(state.orders).forEach(id => _knownOrderIds.add(id));
      _initialLoad = false;
      renderKDS();
    }, err => {
      console.error('Firebase /orders error:', err.code);
      document.getElementById('col-new').innerHTML =
        `<p style="color:#EF4444;text-align:center;padding:20px;font-size:.85rem;">❌ Erreur Firebase: ${err.code}</p>`;
    });

    rtdb.ref('/drivers').on('value', snap => {
      state.drivers = snap.val() || {};
      renderKDS();
    }, err => console.error('drivers:', err.code));

    // Start demo mode after 8s if no orders in Firebase
    setTimeout(() => {
      if (Object.keys(state.orders || {}).length === 0) startDemoMode();
    }, 8000);
  </script>
</body>

</html>
