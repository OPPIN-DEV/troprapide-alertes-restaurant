<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KDS — Cuisine TropRapide</title>
  <style>
    :root {
      --bg: #000;
      --card: #111;
      --border: #222;
      --yellow: #F5C800;
      --green: #22C55E;
      --red: #EF4444;
      --orange: #F97316;
      --blue: #3B82F6;
      --muted: #888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status {
      font-weight: 900;
      color: var(--green);
    }

    .header-stats {
      display: flex;
      gap: 12px;
    }

    .hstat {
      font-size: .8rem;
      color: var(--muted);
    }

    .hstat span {
      color: #fff;
      font-weight: 700;
    }

    /* NOTIFICATION TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--yellow);
      color: #000;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 900;
      font-size: .9rem;
      z-index: 999;
      transform: translateY(100px);
      transition: transform .3s;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(245, 200, 0, .3);
    }

    .toast.show {
      transform: translateY(0);
    }

    /* GRID */
    .kds-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: calc(100vh - 52px);
    }

    .kds-column {
      border-right: 2px solid #111;
      padding: 10px;
      overflow-y: auto;
    }

    .kds-column:last-child {
      border-right: none;
    }

    /* COLUMN TITLE */
    .kds-title {
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 10px;
      padding: 6px 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .col-count {
      font-size: .75rem;
      font-weight: 400;
      color: var(--muted);
    }

    /* CARD */
    .kds-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 6px solid var(--yellow);
      transition: border-color .3s;
    }

    .kds-card.urgente {
      border-left: 6px solid var(--red);
      background: #1a0f0f;
      animation: blink 1s infinite;
    }

    .kds-card.dispatch-done {
      border-left: 6px solid var(--blue);
    }

    @keyframes blink {
      0% {
        background: #1a0f0f;
      }

      50% {
        background: #2a0000;
      }

      100% {
        background: #1a0f0f;
      }
    }

    .kds-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .kds-id {
      color: var(--yellow);
      font-size: .9rem;
    }

    .kds-time {
      font-size: .85rem;
      color: var(--muted);
    }

    .kds-time.urgent {
      color: var(--red);
      animation: blink-text 1s infinite;
    }

    @keyframes blink-text {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    .kds-items {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 8px 0;
      line-height: 1.3;
    }

    .kds-meta {
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .kds-meta span {
      white-space: nowrap;
    }

    /* DRIVER BADGE on card */
    .driver-tag {
      background: #00001a;
      border: 1px solid var(--blue);
      color: var(--blue);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 8px;
    }

    /* ACTIONS */
    .kds-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .kds-btn {
      flex: 1;
      padding: 11px;
      font-weight: 900;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      transition: transform .1s;
    }

    .kds-btn:active {
      transform: scale(.96);
    }

    .btn-accept {
      background: var(--yellow);
      color: #000;
    }

    .btn-ready {
      background: var(--green);
      color: #fff;
    }

    .btn-cancel {
      background: #1a1a1a;
      color: var(--muted);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="status">🟢 CUISINE OUVERTE</div>
      <div class="header-stats">
        <span class="hstat">Nouvelles: <span id="h-new">0</span></span>
        <span class="hstat">Cuisine: <span id="h-prep">0</span></span>
        <span class="hstat">Prêtes: <span id="h-ready">0</span></span>
      </div>
    </div>
    <div id="time" style="color:var(--muted);font-size:.9rem;"></div>
  </div>

  <!-- KDS COLUMNS -->
  <div class="kds-container">

    <div class="kds-column">
      <div class="kds-title" style="background:#1a0000;">
        🔴 NOUVELLES
        <span class="col-count" id="count-new"></span>
      </div>
      <div id="col-new"></div>
    </div>

    <div class="kds-column">
      <div class="kds-title" style="background:#0f0800;">
        🟠 EN PRÉPARATION
        <span class="col-count" id="count-prep"></span>
      </div>
      <div id="col-prep"></div>
    </div>

    <div class="kds-column">
      <div class="kds-title" style="background:#001a00;">
        🟢 PRÊTES — DISPATCH AUTO
        <span class="col-count" id="count-ready"></span>
      </div>
      <div id="col-ready"></div>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    /* ============================================================
       FIREBASE BACKEND
       ============================================================ */
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyD0FL4ua8NUWKfwu_gGUL5TI1RkiNbBZnU",
      authDomain: "troprapide-821a7.firebaseapp.com",
      databaseURL: "https://troprapide-821a7-default-rtdb.firebaseio.com",
      projectId: "troprapide-821a7"
    };
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const _fbdb = firebase.database();

    let _cache = { orders: {}, drivers: {}, log: [], revenue: 0 };

    const SEED_DRIVERS = {
      'd1': { name: 'Ali Koné', avatar: '🏍️', lat: 5.370, lng: -3.980, status: 'available', speed: 1.2, activeOrders: 0 },
      'd2': { name: 'Brice Yao', avatar: '🛵', lat: 5.300, lng: -4.050, status: 'available', speed: 1.0, activeOrders: 0 },
      'd3': { name: 'Cédric Ama', avatar: '🏍️', lat: 5.352, lng: -4.020, status: 'available', speed: 1.5, activeOrders: 0 }
    };

    const ZONE_COORDS = {
      'Cocody': { lat: 5.370, lng: -3.980 }, 'Koumassi': { lat: 5.290, lng: -4.010 },
      'Treichville': { lat: 5.300, lng: -4.005 }, 'Plateau': { lat: 5.320, lng: -4.020 },
      'Yopougon': { lat: 5.350, lng: -4.070 }, 'Adjamé': { lat: 5.360, lng: -4.025 }
    };

    function normalizeOrder(id, o) {
      if (o.total == null && o.amount != null) o.total = Number(o.amount);
      if (o.address == null && o.adresse != null) o.address = o.adresse;
      if (!o.restaurantLat) { o.restaurantLat = 5.340; o.restaurantLng = -4.010; }
      if (!o.lat && o.zone && ZONE_COORDS[o.zone]) {
        const zc = ZONE_COORDS[o.zone];
        o.lat = parseFloat((zc.lat + (Math.random() * 0.01 - 0.005)).toFixed(5));
        o.lng = parseFloat((zc.lng + (Math.random() * 0.01 - 0.005)).toFixed(5));
        _fbdb.ref('orders/' + id).update({ lat: o.lat, lng: o.lng, restaurantLat: o.restaurantLat, restaurantLng: o.restaurantLng });
      }
      return o;
    }

    function normalizeDriver(id, d) {
      // Handle French field names from real Firebase data
      if (!d.name && d.nom) d.name = d.nom;
      if (!d.name && d.prenom) d.name = (d.prenom + ' ' + (d.nom || '')).trim();
      if (!d.name) d.name = 'Livreur #' + String(id).slice(-4);
      if (!d.avatar) d.avatar = '🏍️';
      // Ensure GPS coords exist
      if (!d.lat) d.lat = parseFloat((5.340 + (Math.random() * 0.06 - 0.03)).toFixed(5));
      if (!d.lng) d.lng = parseFloat((-4.010 + (Math.random() * 0.06 - 0.03)).toFixed(5));
      if (!d.speed) d.speed = 1.0;
      if (d.activeOrders == null) d.activeOrders = 0;
      // Normalize status (French → English)
      if (!d.status && d.statut) d.status = d.statut;
      if (['disponible', 'actif', 'libre', 'on', 'active'].includes(String(d.status).toLowerCase())) d.status = 'available';
      if (['occupé', 'occupe', 'en_mission', 'busy_', 'off'].includes(String(d.status).toLowerCase())) d.status = 'busy';
      if (!d.status) d.status = 'available';
      return d;
    }

    function getDB() { return _cache; }

    function saveDB(data) {
      _cache = data;
      const updates = {};
      Object.entries(data.orders || {}).forEach(([id, o]) => { updates['orders/' + id] = o; });
      Object.entries(data.drivers || {}).forEach(([id, d]) => { updates['livreurs/' + id] = d; });
      if (Object.keys(updates).length > 0) _fbdb.ref().update(updates);
    }

    /* XSS sanitization */
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function addLog(msg) {
      _cache.log = _cache.log || [];
      _cache.log.unshift({ time: Date.now(), msg });
      if (_cache.log.length > 80) _cache.log = _cache.log.slice(0, 80);
    }

    /* ============================================================
       MOTEUR DISPATCH (intégré dans KDS)
       Déclenché automatiquement quand une commande passe en "prete"
       ============================================================ */
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findBestDriver(order, drivers) {
      let best = null, bestScore = Infinity;
      Object.entries(drivers).forEach(([id, d]) => {
        if (d.status !== 'available' && d.status !== 'disponible') return;
        const dist = getDistance(order.lat, order.lng, d.lat, d.lng);
        const load = d.activeOrders || 0;
        const perf = d.speed || 1;
        // ALGORITHME CORE: score = distance + (charge × 2) − performance
        const score = dist + (load * 2) - perf;
        if (score < bestScore) { bestScore = score; best = { id, ...d, _dist: dist.toFixed(1), _score: bestScore }; }
      });
      return best;
    }

    function autoDispatch(orderId) {
      // Always fetch fresh driver data directly from Firebase — never rely on cache
      _fbdb.ref('livreurs').once('value').then(snap => {
        const rawDrivers = snap.val() || {};
        const drivers = {};
        Object.entries(rawDrivers).forEach(([id, d]) => { normalizeDriver(id, d); drivers[id] = d; });

        const order = _cache.orders[orderId];
        if (!order || order.assignedTo || order.status !== 'prete') return;

        const best = findBestDriver(order, drivers);
        if (!best) {
          showToast(`❌ Aucun livreur dispo pour #${orderId.slice(-4)}`, '#EF4444');
          addLog(`❌ Aucun livreur disponible — commande #${orderId.slice(-4)} en attente`);
          return;
        }

        const now = Date.now();
        _fbdb.ref().update({
          [`orders/${orderId}/assignedTo`]: best.id,
          [`orders/${orderId}/assignedName`]: best.name,
          [`orders/${orderId}/status`]: 'en-route',
          [`orders/${orderId}/dispatchedAt`]: now,
          [`livreurs/${best.id}/status`]: 'busy',
          [`livreurs/${best.id}/activeOrders`]: (best.activeOrders || 0) + 1,
          [`livreurs/${best.id}/currentOrder`]: orderId
        });

        addLog(`⚡ AUTO-DISPATCH: #${orderId.slice(-4)} → ${best.name} (${best._dist} km)`);
        showToast(`⚡ Dispatch: #${orderId.slice(-4)} → ${best.name} (${best._dist}km)`, '#F5C800');
      });
    }

    /* ============================================================
       TOAST
       ============================================================ */
    let toastTimer = null;
    function showToast(msg, color = '#F5C800') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = color;
      t.style.color = color === '#F5C800' ? '#000' : '#fff';
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }

    /* ============================================================
       RENDER KDS
       ============================================================ */
    function renderKDS() {
      const db = getDB();
      const orders = db.orders || {};

      const newCol = document.getElementById('col-new');
      const prepCol = document.getElementById('col-prep');
      const readyCol = document.getElementById('col-ready');

      newCol.innerHTML = '';
      prepCol.innerHTML = '';
      readyCol.innerHTML = '';

      let cntNew = 0, cntPrep = 0, cntReady = 0;

      // Only show kitchen-relevant statuses (not en-route/livree)
      const kitchenOrders = Object.entries(orders)
        .filter(([, o]) => ['nouvelle', 'acceptee', 'prete'].includes(o.status))
        .sort((a, b) => (a[1].createdAt || 0) - (b[1].createdAt || 0));

      if (kitchenOrders.length === 0) {
        newCol.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px 10px;font-size:.85rem;">Aucune commande</p>';
      }

      kitchenOrders.forEach(([key, o]) => {
        const elapsed = Math.floor((Date.now() - (o.createdAt || Date.now())) / 60000);
        const isUrgent = elapsed > 15 && o.status !== 'prete';

        const card = `
      <div class="kds-card ${isUrgent ? 'urgente' : ''} ${o.status === 'prete' && o.assignedTo ? 'dispatch-done' : ''}">

        <div class="kds-header">
          <span class="kds-id">#${key.slice(-6).toUpperCase()}</span>
          <span class="kds-time ${isUrgent ? 'urgent' : ''}">${elapsed} min</span>
        </div>

        <div class="kds-items">${esc(o.items) || '—'}</div>

        <div class="kds-meta">
          <span>👤 ${esc(o.client) || '—'}</span>
          <span>📍 ${esc(o.zone) || '—'}</span>
          <span>💰 ${o.total ? o.total.toLocaleString('fr') + ' FCFA' : ''}</span>
        </div>

        ${o.assignedTo ? `<div class="driver-tag">🏍️ ${esc(o.assignedName || o.assignedTo)} — En route</div>` : ''}

        <div class="kds-actions">
          ${o.status === 'nouvelle'
            ? `<button class="kds-btn btn-cancel" onclick="updateStatus('${key}','annulee')">✕</button>
               <button class="kds-btn btn-accept" onclick="updateStatus('${key}','acceptee')">✅ ACCEPTER</button>`
            : ''
          }
          ${o.status === 'acceptee'
            ? `<button class="kds-btn btn-ready" onclick="markReady('${key}')">🟢 COMMANDE PRÊTE</button>`
            : ''
          }
          ${o.status === 'prete' && !o.assignedTo
            ? `<button class="kds-btn btn-ready" style="background:var(--orange);" onclick="autoDispatch('${key}')">⚡ DISPATCH MANUELLEMENT</button>`
            : ''
          }
          ${o.status === 'prete' && o.assignedTo
            ? `<div style="text-align:center;width:100%;color:var(--blue);font-weight:700;font-size:.85rem;">
                 ✅ Livreur assigné — En route
               </div>`
            : ''
          }
        </div>
      </div>`;

        if (o.status === 'nouvelle') { newCol.innerHTML += card; cntNew++; }
        if (o.status === 'acceptee') { prepCol.innerHTML += card; cntPrep++; }
        if (o.status === 'prete') { readyCol.innerHTML += card; cntReady++; }
      });

      // Column counts
      document.getElementById('count-new').textContent = cntNew > 0 ? cntNew : '';
      document.getElementById('count-prep').textContent = cntPrep > 0 ? cntPrep : '';
      document.getElementById('count-ready').textContent = cntReady > 0 ? cntReady : '';

      // Header stats
      document.getElementById('h-new').textContent = cntNew;
      document.getElementById('h-prep').textContent = cntPrep;
      document.getElementById('h-ready').textContent = cntReady;

      // Show en-route/delivered count in ready column
      const enRoute = Object.values(orders).filter(o => o.status === 'en-route').length;
      if (enRoute > 0) {
        readyCol.innerHTML += `
      <div style="text-align:center;color:var(--muted);font-size:.8rem;padding:10px;border-top:1px solid var(--border);margin-top:4px;">
        🔵 ${enRoute} commande(s) en route
      </div>`;
      }
    }

    /* ============================================================
       STATUS UPDATES
       ============================================================ */
    function updateStatus(id, status) {
      const db = getDB();
      if (!db.orders[id]) return;
      db.orders[id].status = status;
      db.orders[id].updatedAt = Date.now();
      if (status === 'annulee') {
        addLog(`❌ Commande #${id.slice(-4)} annulée par la cuisine`);
      } else if (status === 'acceptee') {
        addLog(`🍳 #${id.slice(-4)} acceptée — Préparation en cours`);
      }
      saveDB(db);
      renderKDS();
    }

    // Mark ready + auto-dispatch
    function markReady(id) {
      const db = getDB();
      if (!db.orders[id]) return;
      db.orders[id].status = 'prete';
      db.orders[id].readyAt = Date.now();
      addLog(`🟢 #${id.slice(-4)} prête — Dispatch automatique lancé`);
      saveDB(db);
      renderKDS();
      // Auto-dispatch with small delay (kitchen confirmation feel)
      setTimeout(() => autoDispatch(id), 800);
    }

    /* ============================================================
       SIMULATE NEW ORDER (for demo — every 30s)
       ============================================================ */
    const DEMO_CLIENTS = ['Kouamé', 'Fatou', 'Pierre', 'Aminata', 'Roland', 'Sylvie'];
    const DEMO_ITEMS = [
      'Poulet braisé + Attiéké', 'Riz + Sauce graine', 'Foutou + Sauce arachide',
      'Poisson braisé + Alloco', 'Kedjenou de poulet'
    ];
    const DEMO_ZONES = ['Cocody', 'Koumassi', 'Treichville', 'Plateau', 'Yopougon'];

    let demoTimer = null;
    function startDemoMode() {
      if (demoTimer) return;
      demoTimer = setInterval(() => {
        const db = getDB();
        // Only inject if less than 5 pending orders
        const pending = Object.values(db.orders || {}).filter(o => ['nouvelle', 'acceptee'].includes(o.status)).length;
        if (pending >= 5) return;
        const zone = DEMO_ZONES[Math.floor(Math.random() * DEMO_ZONES.length)];
        const z = ZONE_COORDS[zone];
        const id = 'cmd' + Date.now();
        db.orders[id] = {
          client: DEMO_CLIENTS[Math.floor(Math.random() * DEMO_CLIENTS.length)],
          items: DEMO_ITEMS[Math.floor(Math.random() * DEMO_ITEMS.length)],
          total: 3000 + Math.floor(Math.random() * 2000),
          zone, lat: z.lat + (Math.random() * .01 - .005), lng: z.lng + (Math.random() * .01 - .005),
          status: 'nouvelle', restaurant: 'TropRapide',
          restaurantLat: 5.340, restaurantLng: -4.010,
          assignedTo: null, assignedName: null,
          createdAt: Date.now()
        };
        db.log = db.log || [];
        db.log.unshift({ time: Date.now(), msg: `📱 Nouvelle commande simulée — ${zone}` });
        saveDB(db);
        renderKDS();
        showToast('📱 Nouvelle commande reçue !', '#F97316');
      }, 45000); // new order every 45s in demo mode
    }

    /* ============================================================
       CLOCK + INIT
       ============================================================ */
    setInterval(() => {
      document.getElementById('time').textContent = new Date().toLocaleTimeString('fr');
    }, 1000);

    /* ── BIP SONORE ── */
    let _knownOrderIds = new Set();
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[660, 0], [880, .2], [1100, .4]].forEach(([f, t]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(.5, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .18);
          o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .19);
        });
        setTimeout(() => ctx.close(), 800);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      } catch (e) { }
    }
    function checkNewOrders() {
      const orders = _cache.orders || {};
      let hasNew = false;
      Object.keys(orders).forEach(id => {
        if (!_knownOrderIds.has(id) && orders[id].status === 'nouvelle') hasNew = true;
        _knownOrderIds.add(id);
      });
      if (hasNew) playBeep();
    }

    /* ── FIREBASE LISTENERS (remplace localStorage + polling) ── */
    let _firstOrderLoad = true;

    _fbdb.ref('orders').on('value', snap => {
      const orders = snap.val() || {};
      Object.keys(orders).forEach(id => normalizeOrder(id, orders[id]));
      _cache.orders = orders;
      if (_firstOrderLoad) {
        // On startup: mark existing orders as known so we don't beep for them
        Object.keys(orders).forEach(id => _knownOrderIds.add(id));
        _firstOrderLoad = false;
      } else {
        checkNewOrders();
      }
      renderKDS();
    });

    _fbdb.ref('livreurs').on('value', snap => {
      const rawDrivers = snap.val();
      if (rawDrivers && Object.keys(rawDrivers).length > 0) {
        const normalized = {};
        const updates = {};
        Object.entries(rawDrivers).forEach(([id, d]) => {
          const before = JSON.stringify(d);
          normalizeDriver(id, d);
          if (JSON.stringify(d) !== before) updates['livreurs/' + id] = d;
          normalized[id] = d;
        });
        _cache.drivers = normalized;
        if (Object.keys(updates).length > 0) _fbdb.ref().update(updates);
      }
      renderKDS();
    });
  </script>
</body>
