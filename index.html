<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDS — Cuisine TropRapide</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#000;--card:#111;--border:#222;
  --yellow:#F5C800;--green:#22C55E;--red:#EF4444;--orange:#F97316;--blue:#3B82F6;
  --muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{margin:0;background:var(--bg);color:#fff;font-family:Arial,sans-serif;}

.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:#0a0a0a;border-bottom:1px solid var(--border);
}
.header-left{display:flex;align-items:center;gap:16px;}
.status{font-weight:900;color:var(--green);}
.header-stats{display:flex;gap:12px;}
.hstat{font-size:.8rem;color:var(--muted);}
.hstat span{color:#fff;font-weight:700;}

.fb-status{font-size:.75rem;padding:4px 10px;border-radius:20px;font-weight:700;}
.fb-ok{background:#022;color:var(--green);}
.fb-err{background:#200;color:var(--red);}
.fb-connecting{background:#221;color:var(--yellow);}

.toast{
  position:fixed;bottom:20px;right:20px;background:var(--yellow);color:#000;
  padding:12px 18px;border-radius:12px;font-weight:900;font-size:.9rem;
  z-index:999;transform:translateY(100px);transition:transform .3s;max-width:320px;
  box-shadow:0 4px 20px rgba(245,200,0,.3);
}
.toast.show{transform:translateY(0);}

.kds-container{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  height:calc(100vh - 52px);
}
.kds-column{border-right:2px solid #111;padding:10px;overflow-y:auto;}
.kds-column:last-child{border-right:none;}

.kds-title{
  font-size:1rem;font-weight:900;margin-bottom:10px;padding:6px 8px;
  border-radius:8px;display:flex;justify-content:space-between;align-items:center;
}
.col-count{font-size:.75rem;font-weight:400;color:var(--muted);}

.kds-card{
  background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;
  border-left:6px solid var(--yellow);transition:border-color .3s;
}
.kds-card.urgente{border-left:6px solid var(--red);background:#1a0f0f;animation:blink 1s infinite;}
.kds-card.attribue{border-left:6px solid var(--blue);}
@keyframes blink{0%{background:#1a0f0f;}50%{background:#2a0000;}100%{background:#1a0f0f;}}

.kds-header{display:flex;justify-content:space-between;align-items:flex-start;font-weight:900;margin-bottom:8px;}
.kds-id{color:var(--yellow);font-size:.9rem;}
.kds-time{font-size:.85rem;color:var(--muted);}
.kds-time.urgent{color:var(--red);animation:blink-text 1s infinite;}
@keyframes blink-text{0%,100%{opacity:1;}50%{opacity:.4;}}

.kds-items{font-size:1.1rem;font-weight:800;margin:8px 0;line-height:1.3;}
.kds-meta{font-size:.8rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.kds-meta span{white-space:nowrap;}

.driver-tag{
  background:#00001a;border:1px solid var(--blue);color:var(--blue);
  padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;
  display:inline-block;margin-bottom:8px;
}

.kds-actions{display:flex;gap:8px;margin-top:4px;}
.kds-btn{
  flex:1;padding:11px;font-weight:900;border-radius:8px;border:none;cursor:pointer;
  font-size:.85rem;transition:transform .1s;
}
.kds-btn:active{transform:scale(.96);}
.kds-btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-accept{background:var(--yellow);color:#000;}
.btn-ready{background:var(--green);color:#fff;}
.btn-cancel{background:#1a1a1a;color:var(--muted);border:1px solid var(--border);}

.empty-col{color:var(--muted);text-align:center;padding:30px 10px;font-size:.85rem;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="status">🟢 CUISINE OUVERTE</div>
    <div class="header-stats">
      <span class="hstat">Nouvelles: <span id="h-new">0</span></span>
      <span class="hstat">Cuisine: <span id="h-prep">0</span></span>
      <span class="hstat">Prêtes: <span id="h-ready">0</span></span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="fb-status fb-connecting" id="fb-badge">🔄 Connexion...</span>
    <div id="time" style="color:var(--muted);font-size:.9rem;"></div>
  </div>
</div>

<div class="kds-container">
  <div class="kds-column">
    <div class="kds-title" style="background:#1a0000;">
      🔴 NOUVELLES <span class="col-count" id="count-new"></span>
    </div>
    <div id="col-new"><div class="empty-col">Chargement...</div></div>
  </div>
  <div class="kds-column">
    <div class="kds-title" style="background:#0f0800;">
      🟠 EN PRÉPARATION <span class="col-count" id="count-prep"></span>
    </div>
    <div id="col-prep"></div>
  </div>
  <div class="kds-column">
    <div class="kds-title" style="background:#001a00;">
      🟢 PRÊTES <span class="col-count" id="count-ready"></span>
    </div>
    <div id="col-ready"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   FIREBASE CONFIGURATION
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD0FL4ua8NUWKfwu_gGUL5TI1RkiNbBZnU",
  authDomain: "troprapide-821a7.firebaseapp.com",
  databaseURL: "https://troprapide-821a7-default-rtdb.firebaseio.com",
  projectId: "troprapide-821a7"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

/* ── XSS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ── Firebase badge ── */
function setBadge(state){
  const b = document.getElementById('fb-badge');
  b.className = 'fb-status fb-'+state;
  b.textContent = state==='ok' ? '🔥 Firebase OK' : state==='err' ? '❌ Erreur Firebase' : '🔄 Connexion...';
}

/* ── Toast ── */
let toastTimer = null;
function showToast(msg, color='#F5C800'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = color==='#F5C800' ? '#000' : '#fff';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 4000);
}

/* ── State ── */
let _orders = {}, _livreurs = {};

/* ── Round-robin dispatch: rotate through available livreurs in order ── */
let _lastAssignedId = null;

function findBestDriver(order){
  const excluded = order.declinedBy ? Object.values(order.declinedBy) : [];
  const available = Object.entries(_livreurs)
    .filter(([id,d]) => d && d.status==='available' && !excluded.includes(id))
    .sort((a,b) => a[0].localeCompare(b[0])); // stable alphabetical order by key

  if(available.length === 0) return null;

  // Pick the next one after the last assigned (round-robin)
  let idx = 0;
  if(_lastAssignedId){
    const lastIdx = available.findIndex(([id]) => id === _lastAssignedId);
    idx = (lastIdx + 1) % available.length;
  }
  const [id, d] = available[idx];
  _lastAssignedId = id;
  return { id, ...d };
}

/* ── Beep ── */
let _knownIds = new Set();
function playBeep(){
  try{
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [[660,0],[880,.2],[1100,.4]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.18);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.19);
    });
    setTimeout(()=>ctx.close(),800);
  }catch(e){}
}

/* ============================================================
   STATUS ACTIONS
   ============================================================ */
function updateStatus(id, status){
  rtdb.ref('/orders/'+id).update({ status, updatedAt: Date.now() })
    .then(()=>{
      const msgs = {
        'annulee': `❌ Commande #${id.slice(-4)} annulée`,
        'acceptee': `🍳 #${id.slice(-4)} acceptée — Préparation en cours`,
      };
      showToast(msgs[status] || 'Statut mis à jour', status==='annulee' ? '#EF4444' : '#F5C800');
    })
    .catch(e=> showToast('Erreur: '+e.message, '#EF4444'));
}

function markReady(id){
  const order = _orders[id] || {};
  const best = findBestDriver(order);
  if(!best){
    rtdb.ref('/orders/'+id).update({ status:'prete', readyAt: Date.now() })
      .then(()=> showToast(`🟢 #${id.slice(-4)} PRÊTE — Aucun livreur dispo`, '#F97316'))
      .catch(e=> showToast('Erreur: '+e.message, '#EF4444'));
    return;
  }
  const updates = {};
  updates[`/orders/${id}/status`]                    = 'attribue';
  updates[`/orders/${id}/readyAt`]                   = Date.now();
  updates[`/orders/${id}/assignedTo`]                = best.id;
  updates[`/orders/${id}/assignedName`]              = best.name;
  updates[`/orders/${id}/dispatchedAt`]              = Date.now();
  updates[`/livreurs/${best.id}/status`]             = 'busy';
  updates[`/livreurs/${best.id}/activeOrders`]       = (best.activeOrders||0) + 1;
  updates[`/livreurs/${best.id}/currentOrder`]       = id;
  rtdb.ref().update(updates)
    .then(()=> showToast(`📲 #${id.slice(-4)} → ${best.name}`, '#3B82F6'))
    .catch(e=> showToast('Erreur: '+e.message, '#EF4444'));
}

/* ============================================================
   RENDER KDS
   ============================================================ */
function renderKDS(orders){
  const newCol   = document.getElementById('col-new');
  const prepCol  = document.getElementById('col-prep');
  const readyCol = document.getElementById('col-ready');
  newCol.innerHTML = prepCol.innerHTML = readyCol.innerHTML = '';

  let cntNew=0, cntPrep=0, cntReady=0;
  let hasNewOrder = false;

  const kitchenOrders = Object.entries(orders)
    .filter(([,o]) => ['nouvelle','acceptee','prete','attribue'].includes(o.status))
    .sort((a,b) => (a[1].createdAt||0) - (b[1].createdAt||0));

  if(kitchenOrders.length === 0){
    newCol.innerHTML = '<div class="empty-col">Aucune commande en attente</div>';
  }

  kitchenOrders.forEach(([key,o])=>{
    if(!_knownIds.has(key) && o.status==='nouvelle'){ hasNewOrder = true; }
    _knownIds.add(key);

    const elapsed = Math.floor((Date.now() - (o.createdAt||Date.now())) / 60000);
    const isUrgent = elapsed > 15 && o.status !== 'prete' && o.status !== 'attribue';
    const isAttribue = o.status === 'attribue';

    const card = `
      <div class="kds-card ${isUrgent?'urgente':''} ${isAttribue?'attribue':''}">
        <div class="kds-header">
          <span class="kds-id">#${key.slice(-6).toUpperCase()}</span>
          <span class="kds-time ${isUrgent?'urgent':''}">${elapsed} min</span>
        </div>
        <div class="kds-items">${esc(o.items||o.plat||'—')}</div>
        <div class="kds-meta">
          <span>👤 ${esc(o.client||o.nom||'—')}</span>
          <span>📍 ${esc(o.zone||o.adresse||'—')}</span>
          ${o.total||o.amount ? `<span>💰 ${Number(o.total||o.amount||0).toLocaleString('fr')} FCFA</span>` : ''}
        </div>
        ${o.assignedTo||o.assignedName ? `<div class="driver-tag">🏍️ ${esc(o.assignedName||o.assignedTo)} — ${isAttribue?'En attente':'En route'}</div>` : ''}
        <div class="kds-actions">
          ${o.status==='nouvelle' ? `
            <button class="kds-btn btn-cancel" onclick="updateStatus('${key}','annulee')">✕ Annuler</button>
            <button class="kds-btn btn-accept" onclick="updateStatus('${key}','acceptee')">✅ ACCEPTER</button>` : ''}
          ${o.status==='acceptee' ? `
            <button class="kds-btn btn-ready" onclick="markReady('${key}')">🟢 COMMANDE PRÊTE</button>` : ''}
          ${isAttribue ? `
            <div style="text-align:center;width:100%;color:var(--blue);font-weight:700;font-size:.85rem;">
              📲 Livreur en attente de confirmation
            </div>` : ''}
        </div>
      </div>`;

    if(o.status==='nouvelle')                    { newCol.innerHTML  += card; cntNew++; }
    if(o.status==='acceptee')                    { prepCol.innerHTML += card; cntPrep++; }
    if(o.status==='prete'||o.status==='attribue'){ readyCol.innerHTML+= card; cntReady++; }
  });

  const enRoute = Object.values(orders).filter(o=>o.status==='en-route').length;
  if(enRoute > 0){
    readyCol.innerHTML += `<div style="text-align:center;color:var(--muted);font-size:.8rem;padding:8px;border-top:1px solid var(--border);margin-top:4px;">🔵 ${enRoute} commande(s) en route</div>`;
  }

  document.getElementById('count-new').textContent   = cntNew   > 0 ? cntNew   : '';
  document.getElementById('count-prep').textContent  = cntPrep  > 0 ? cntPrep  : '';
  document.getElementById('count-ready').textContent = cntReady > 0 ? cntReady : '';
  document.getElementById('h-new').textContent   = cntNew;
  document.getElementById('h-prep').textContent  = cntPrep;
  document.getElementById('h-ready').textContent = cntReady;

  if(hasNewOrder){ playBeep(); showToast('📱 Nouvelle commande reçue !','#F97316'); }
}

/* ============================================================
   FIREBASE LISTENERS
   ============================================================ */
rtdb.ref('/orders').on('value', snap => {
  setBadge('ok');
  _orders = snap.val() || {};
  renderKDS(_orders);
}, err => {
  setBadge('err');
  document.getElementById('col-new').innerHTML =
    `<div class="empty-col" style="color:var(--red);">❌ Erreur Firebase: ${err.code}</div>`;
});

rtdb.ref('/livreurs').on('value', snap => {
  _livreurs = snap.val() || {};
}, () => {});

/* ── Clock ── */
setInterval(()=>{
  document.getElementById('time').textContent = new Date().toLocaleTimeString('fr');
}, 1000);
</script>
</body>
</html>
